  assignablePolicies(pageArgs: PageArgs, filters: AssignablePolicyFilters): AccountPoliciesDataConnection

  """
  Resources that are can be used for eligibility
  This is list of the resources in the provider.
  """
  assignableResources(pageArgs: PageArgs, filters: AssignableResourcesFilters): ResourcesDataConnection

  """Assignable Services that can be used for JIT Resource Set"""
  assignableServices(pageArgs: PageArgs, filters: AssignableServicesFilters): AssignableServicesConnection
  providerMembersMetadata: ProviderMembersMetadata

  """
  What is the mode of the provider or application. Is enforcement mode enabled or not.
  TODO: This is a placeholder for the future work.
  """
