  identityOriginType: IdentityOriginTypeFilter

  """
  OR filter for IdentityOriginAccountFilters. Each OR is appended to the filter to create a DNF expression.
  """
  or: IdentityOriginAccountFilters
}

type IdentityOriginAccountsSummary {
  """whether this identity is present in this account via IDC instance."""
  isGlobal: Boolean!

  """
  count of local instances of this identity in this account. It is one if single IAM user.
  It is 2 when it is present in both username=foo and username=foo@acme.com
  """
  localCount: Int!

  """
  count of number of cross account incarnations of this identity that has access to this account.
  Eg. foo IAM user is present in both account A and B. Then foo IAM user in account B has been given trust
  via a Role_B2A in account A. So, in account A foo has cross_account_count = 1.
  """
  crossAccountCount: Int!
}

type IdentityOriginData {
  """The type of the origin system like IDP, HRIS, AWS_IDC, AWS_IAM"""
  identityOriginType: IdentityOriginType

  """
  Id of the source system. Eg. in case of IAM it is the andromeda ID of
  source Account.
  """
  originId: String
  originName: String

  """true if the user is source of truth user"""
  isSourceOfTruth: Boolean

  """true if user has incarantion"""
  hasIncarnation: Boolean

  """Andromeda User UUID of the origin User."""
  originUserId: String

  """Name of the origin User."""
  originUserName: String

  """Username of the origin User."""
  originUserUsername: String
  userCreatedAt: String
  lastUpdatedAt: String
  lastLoginAt: String
  passwordLastUsed: String

  """State of the origin User in the origin source."""
  state: ExternalUserStatus

  """Blast risk for the user"""
  blastRisk: Int

  """Blast risk level for the user"""
  blastRiskLevel: RiskLevel

  """
  TODO(AS-7016)
  All the significances related to this identity origin.
  """
  opsInsights: [IdentityOpsInsightData!]

  """
  oneof origin_data {
   IdentityHrisData hris_data = 20;
   IdentityIdpData idp_data = 21;
   IdentityAwsIdcData aws_idc_data = 22;
   IdentityAwsIamData aws_iam_data = 23;
   IdentityAzureData azure_data = 24;
   IdentityProviderIdpSsoData iam_sso_data = 25;
  }
    option (utils.graphql_options) = {
   union_type: "identityOriginType"
  };
  """
  hrisData: IdentityHrisData
  idpData: IdentityIdpData
  awsIdcData: IdentityAwsIdcData
  awsIamData: IdentityAwsIamData
  azureData: IdentityAzureData

  """In this case the origin_id == AWS Provider ID"""
  providerIdpSsoData: IdentityProviderIdpSsoData
  applicationData: IdentityApplicationData

  """Identity Information"""
  identity: Identity
  providerId: String
  providerName: String
  originScope: ScopeUnion

  """
  List of groups this user is part of typically in the IDP system.
  This can only be in context of a provider. So, we need to create a
  new connection for this.
  """
  membershipGroups(pageArgs: PageArgs, filters: GroupsFilters): UserGroupMembershipConnection
  originUserExternalId: String
  originUserEmail: String

  """TBD"""
  isIncarnation: Boolean

  """New Org Info"""
  orgInfo: IdentityOrgInfo
  userMfaData: [MfaData!]
  isPrivilegedUser: Boolean
  consoleAccess: Boolean
  accessKeysSummary(filters: KeysSummaryCountFilters): AccessKeysSummary
  tags: [Tag!]
  accessKeyData(pageArgs: PageArgs): AccessKeyDataConnection
  rulesApplied: RulesAppliedConnection

  """
  UserSyncInfo is resolved at runtime to avoid circular dependency
  The actual type is andromeda.nonpublic.graph.UserSyncInfo from user_service.proto
  """
  syncInfo: UserSyncInfo
}

