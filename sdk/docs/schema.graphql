  """
  connection of child and sso providers that were either discovered or created from this provider.
  These can include everything from different kind of auth types providers.
  When this provider is an IDP application it will only include the IDP applications that were created from this provider.
  """
  idpAppProviders(pageArgs: PageArgs, filters: ProviderFilters): IdpAppProvidersConnection

  """Summary of the related providers that are tied to this provider."""
  idpAppProvidersSummary: IdpAppProvidersSummary
