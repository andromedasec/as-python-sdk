type AccessReview {
  id: String

  """The campaign to which this review belongs to"""
  campaignId: String
  campaignName: String
  accessData: AccessAssignmentData

  """
  It represents what type of access is being reviewed.
  The entitlement type is derived from the campaign's entitlement type
  The following data is present for different entitlement types
  1. ROLE_ASSIGNMENT - the role name, role_id and configured assignments showing how the user
    got the access to the role assignment.
  2. GROUP - user is member of a group. In this case the role and assignment data is not
   applicable. Only the group name and group id is applicable.
  andromeda.api.models.config.EntitlementTypeMessage.EntitlementType entitlement_type = 6;
  """
  accessAnalysis: AccessReviewAiAnalysis

  """
  Assigned reviewer of the access review who is responsible for the "certification"
  And, ultimately responsible for the sign-off. It is possible that the review is ultimately
  done by admin or uar owner. That would be reflected in the review status
  This identity changes if the review is re-assigned to another user. However,
  it will not change when it is forwarded to another user for making the decision.
  """
  assignedReviewerId: String
  assignedReviewerName: String
  assignedReviewerIds: [String!]
  assignedReviewer: Identity
  assignedReviewers(pageArgs: PageArgs): IdentitiesConnection
  reviewTrail: [CampaignSnapshotReviewAction!]
  originalReviewerId: String
  originalReviewerName: String
  originalReviewerIds: [String!]
  originalReviewer: Identity

  """
  This needs to be allowed for non-admins but cannot let all fields be accessed
  """
  originalReviewers(pageArgs: PageArgs): IdentitiesConnection

  """AccessReviewerCampaignData Id of the set this belongs to"""
  accessReviewerCampaignDataId: String
  reviewStatus: AccessReviewReviewStatus
  revocationStatus: RevocationStatus
  campaignTemplate: CampaignTemplate
  originalReviewerAssignmentReason: String
  reviewerTrail: [CampaignSnapshotReviewReviewerTrail!]
  hrType: HrType
  department: String
  reviewerStatus: CampaignSnapshotReviewReviewerStatus

  """
  Historical data from the most recent completed campaign access review
  that matches this access review (same principal, role and scope) and
  campaign type (same campaign template).
  """
  lastAccessReview: LastAccessReviewData
  levelledReviewerDetails: AccessReviewLevelledReviewerDetails

  """
  information fetched from review action data
  only applicable if the latest action is change owner on the review
  """
  changeAssetOwnerData: ChangeAssetOwnerActionDisplayData
}

