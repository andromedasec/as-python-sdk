type AccountPolicyData {
  """Andromeda UUID of the policy"""
  policyId: String

  """Name of the Policy"""
  policyName: String

  """What was the type of binding: IAM_ASSIGNMENT or RESOURCE_ASSIGNMENT"""
  policyAssignmentType: PolicyAssignmentType

  """Policy type whether it is permission set or a local IAM role"""
  policyType: PolicyType

  """Blast risk of the policy in this account"""
  blastRisk: Int

  """Blast risk level of the policy. Can be used in the filters"""
  blastRiskLevel: RiskLevel

  """if risk computer has populated risk value for this edge"""
  isBlastRiskComputed: Boolean

  """
  Is this policy Active in the account
  This would be used for filtering and getting only policies with either incoming trusts or eligible mappings
  in this account.
  """
  isActive: Boolean

  """has admin permissions"""
  hasAdminPermissions: Boolean

  """policy last used date time"""
  policyLastUsedAt: String

  """policy last used at data source"""
  policyLastUsedAtDataSource: PolicyLastUsedAtDataSource

  """policy owners"""
  owners(pageArgs: PageArgs): IdentitiesConnection

  """
  The following connection lists all the trusts that have been given to this policy in this account.
  The target policy will alway be an IAM Role in AWS.
  A role can be given trust to assume role another policy.
  """
  outgoingTrusts(pageArgs: PageArgs, filters: TrustFilters): OutgoingTrustsConnection

  """Summary of all the outgoing trusts in this account"""
  outgoingTrustsSummary: PolicyOutgoingTrustsSummary
  isLsp: Boolean
  accountId: String
  accountName: String
  accountMode: AccountMode
  policyDetails(pageArgs: PageArgs): AccountPolicyDetailsConnection

  """
  List of permissions in this policy. For example an AWS PermissionSet can have multiple
  AWS Policies and each policy can have multiple permissions. This is the list of all the permissions
  across all the AWS policies in this account.
  """
  permissionsData(pageArgs: PageArgs, filters: PermissionsDataFilters): PermissionsDataConnection
  isAdminPolicy: Boolean

  """
  It providers policy recommendation based on the permissions used in the policy.
  This would be used to recommend the right sized policy based on the permissions that are used.
  In both the Observation mode and Enforcement mode.
  """
  policyRecommendation(filters: PolicyRecommendationFilters): AccountPolicyRecommendation

  """
  Provides account level operational insights for the policy. Eg. if the policy
  is not used in this account or it is over provisioned etc.
  """
  opsInsights: [PolicyOpsInsightData!]
  numberOfIdentitiesWithPolicyAccess: Int

  """Connection of RoleServiceSummary on a per service type basis"""
  servicesData(pageArgs: PageArgs, filters: RoleServiceDataFilters): RoleServiceDataConnection

  """applies to aws only"""
  roleTrustDocument: String

  """Connection of per-service type data for policy"""
  externalId: String
  permissionsSummary(filters: PermissionsDataFilters): PermissionsSummary
  activities(pageArgs: PageArgs, filters: ActivityFilters): ActivitiesConnection
  resourcesData(pageArgs: PageArgs, filters: ResourcesDataFilters): ResourcesDataConnection
}

