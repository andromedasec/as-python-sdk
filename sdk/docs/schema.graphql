  """TODO: Logo data for all the providers."""
  logo: LogoData
  userResolvedAssignments(pageArgs: PageArgs, filters: AccountPolicyUserResolvedAssignmentsFilters): AccountPolicyUserResolvedAssignmentsConnection
  logIngestionSummary: ProviderLogIngestionSummary
  accessKeys(pageArgs: PageArgs, filters: ProviderAccessKeyFilters): ProviderAccessKeysConnection
  resourceMutationEvents(pageArgs: PageArgs, filters: ResourceMutationEventFilters): ResourceMutationEventsConnection
  numHighRiskHis: Int

  """
  This replaces the current active bindings list for the provider. In this case
