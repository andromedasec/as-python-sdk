"""
Provider Assignment for a humans

This information is in context of an account so the related information about
policy is captured here. It only carries the Policy level information
and does not have any per-identity specific data
incoming trusts here are for all the identities in the account for that policy.
"""
type AccessAssignmentData {
  """Current Provider Data"""
  provider: Provider

  """
  Scope of the assignment within the provider. This is only relevant for the
  cloud providers.
  """
  scope: ScopeUnion

  """
  Type of the Access Assignment Type
  andromeda.api.models.config.EntitlementTypeMessage.EntitlementType entitlement_type = 6;
  """
  account: Account

  """
  Identity incarantion for which this assignment is being reviewed
  The details of the logical identity is already retuned in the
  identity origin data 'identity' attribute
  User ID for which the assignment is being reviewed
  It should be mapped to the identity origin data
  """
  principalId: String
  principalUsername: String

  """ID of the logical User"""
  identityId: String

  """
  Current Identity incarnation data // this should match
  the principal_id == origin_user_id
  """
  principalUser: IdentityOriginData

  """snapshot of the identities level insights at the time of snapshot"""
  identityInsightsSnapshot: IdentityOpsInsightDataList

  """snapshot of the Identity level Risk Factors at the time of snapshot"""
  identityRiskFactorsSnapshot: RiskFactorDataList
  roleName: String

  """
  Data corresponding to the policy that is being reviewed
  at the time of snapshot
  """
  roleSnapshot: AccessReviewPolicySnapshot

  """
  Identities policy insights at the time of snapshot
  Note. these are insights at level of provider, scope, role, identity
  It is different from the identity level insights
  """
  identityPolicyInsightsSnapshot: PolicyOpsInsightDataList

  """Last activity of the principal for this role in the scope"""
  lastActivitySnapshot: ActivitySnapshot

  """
  List of actual assignments that resuled in the resolved
  assignment of role and identity
  """
  assignmentConfigurationSnapshot: AssignmentConfigurationSnapshotConnection
  lastIdentityActivitySnapshot: ActivitySnapshot

  """
  Asset data for ASSET_OWNERSHIP entitlement type campaigns
  Contains information about the asset being reviewed (asset ID, name, type, ownership status)
  Only populated for ASSET_OWNERSHIP campaigns
  """
  assetData: UarAssetData

  """
  Eligibility data for ELIGIBILITY entitlement type campaigns
  Contains eligibility IDs and type for the access review
  Only populated for ELIGIBILITY campaigns
  """
  eligibilityData: UarEligibilityData
}

