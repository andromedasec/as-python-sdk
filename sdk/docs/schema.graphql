type AccountPolicyRecommendation {
  """
  Recommended policy based on the used permissions in the policy.
  JSON version of the recommended policy in the account.
  This information can be used for creating a PermissionSet or IAM Role in AWS.
  Follow the structure and only filter out actions in the statements in each policy / structure inside.
  take care of the empty actions scenarios.
  """
  jsonData: String

  """Risk based on only the used permissions in the policy in this account."""
  blastRisk: Int

  """Risk level for this policy in this account"""
  blastRiskLevel: RiskLevel

  """
  The usage information is not returned as part of the permissions_data in the recommendation.
  we can move it to phase 2 if implementation / test will burn more time. definitely do this
  later part.
  This can be used to serve the count of the permissions.
  If this is not implemented then we can add total_permissions_count instead.
  """
  permissionsData(pageArgs: PageArgs, filters: PermissionsDataFilters): PermissionsDataConnection
  recommendedPolicyName: String
  providerPolicyType: ProviderPolicyType
  responseType: RoleRecommendationResponseType
}

