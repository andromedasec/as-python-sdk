"""
This information is about the origin of the identity who has access to the account
listed in the IdentityAccountData. The origin coule be AWS_IDC or AWS_IAM.
"""
type IdentityOriginAccountData {
  """
  In this scenario, the identity is present in this account via IDC instance or IAM user.
  The origin could be AWS_IDC or AWS_IAM or AWS_IDC_SCIM.
  """
  identityOriginType: IdentityOriginType

  """
  If local then false and if cross account then true.
  Following fields apply when it is a Local IAM user
  The AWS IAM user username.
  """
  username: String

  """The AWS IAM user ARN."""
  arn: String

  """
  In case this is a local user then whether this user was defined in this account
  or user is from a cross account (cross_account.id != identity_account_data.account_id)
  """
  isCrossAccount: Boolean

  """
  Information about the cross account in case identity is local IAM user but
  not defined in this account.
  """
  crossAccountInfo: CrossAccountInfo
}

