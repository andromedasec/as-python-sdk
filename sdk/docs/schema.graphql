  """Summary of configured assignments with usage insights"""
  configuredAssignmentsSummary(filters: ProviderConfiguredAssignmentFilters): ConfiguredAssignmentsSummary
  resources(pageArgs: PageArgs, filters: ResourceFilters): ResourceConnection

  """Provider Features is a list of features that the provider supports."""
